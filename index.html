<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ميلاد فيل الـ 40</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #fce4ec 0%, #f8bbd0 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: #880e4f;
            text-align: center;
        }
        .container {
            background: rgba(255, 255, 255, 0.9);
            padding: 2.5rem;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            max-width: 600px;
            width: 90%;
            border: 2px solid #f48fb1;
        }
        h1 { font-size: 2.2rem; margin-bottom: 10px; color: #ad1457; }
        .date-text { font-size: 1.1rem; color: #c2185b; font-weight: bold; }
        
        /* العداد التنازلي */
        #countdown {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 30px 0;
        }
        .time-box {
            background: #ad1457;
            color: white;
            padding: 15px;
            border-radius: 15px;
            min-width: 70px;
            box-shadow: 0 4px 10px rgba(173, 20, 87, 0.3);
        }
        .time-box span { display: block; font-size: 1.8rem; font-weight: bold; }
        .label { font-size: 0.9rem; margin-top: 5px; opacity: 0.9; }

        /* صندوق الدعاء */
        .dua-container {
            margin-top: 30px;
            padding: 20px;
            background: #fff5f8;
            border-right: 5px solid #ad1457;
            border-radius: 10px;
            font-style: italic;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.05);
        }
        .dua-title { font-weight: bold; margin-bottom: 10px; display: block; color: #ad1457; }
        #dua-text { font-size: 1.2rem; line-height: 1.6; color: #444; }
    </style>
</head>
<body>

<div class="container">
    <h1>🎉 إلى امل.. في عامها الأربعين 🎉</h1>
    <p class="date-text">المتبقي حتى تاريخ: 2026 / 04 / 04</p>

    <div id="countdown">
        <div class="time-box">
            <span id="days">0</span>
            <div class="label">يوم</div>
        </div>
        <div class="time-box">
            <span id="hours">0</span>
            <div class="label">ساعة</div>
        </div>
        <div class="time-box">
            <span id="minutes">0</span>
            <div class="label">دقيقة</div>
        </div>
        <div class="time-box">
            <span id="seconds">0</span>
            <div class="label">ثانية</div>
        </div>
    </div>

    <div class="dua-container">
        <span class="dua-title">✨ دعاء لكِ اليوم:</span>
        <p id="dua-text">جاري تحميل الدعاء...</p>
    </div>
</div>

<script>
    // قائمة الأدعية
    const prayers = [
        "اللهم بارك لـ 'أمل' في عمرها واجعله عاماً مليئاً بالخير والمسرات.",
        "اللهم اكتب لها في سنها الأربعين سعادة لا تنتهي ورزقاً لا ينقطع.",
        "يا رب اجعل ما تبقى من عمرها أجمل مما مضى، واحفظها من كل سوء.",
        "اللهم نوّر دربها، ويسر أمرها، واجعل التوفيق حليفها في كل خطوة.",
        "اللهم ارزقها راحة البال، وطمأنينة القلب، وصحة الجسد.",
        "يا حي يا قيوم، املأ قلبها بالرضا وحياتها بالبركة والجمال.",
        "اللهم سخر لها من حظوظ الدنيا أجملها، ومن الآخرة أعلاها."
    ];

    // اختيار دعاء عشوائي
    function showRandomDua() {
        const randomIndex = Math.floor(Math.random() * prayers.length);
        document.getElementById("dua-text").innerText = prayers[randomIndex];
    }

    // تشغيل العداد
    const targetDate = new Date("April 4, 2026 00:00:00").getTime();

    const timer = setInterval(function() {
        const now = new Date().getTime();
        const distance = targetDate - now;

        const days = Math.floor(distance / (1000 * 60 * 60 * 24));
        const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((distance % (1000 * 60)) / 1000);

        document.getElementById("days").innerText = days;
        document.getElementById("hours").innerText = hours;
        document.getElementById("minutes").innerText = minutes;
        document.getElementById("seconds").innerText = seconds;

        if (distance < 0) {
            clearInterval(timer);
            document.querySelector(".container").innerHTML = "<h1>🎊 ميلاد سعيد يا فيل! أتممتِ الأربعين بكل جمال! 🎊</h1>";
        }
    }, 1000);

    // تفعيل الدعاء عند تحميل الصفحة
    window.onload = showRandomDua;
</script>

</body>
</html>
