<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ميلاد فيل الـ 40</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #fce4ec 0%, #f8bbd0 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #880e4f;
            text-align: center;
        }
        .container {
            background: rgba(255, 255, 255, 0.8);
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 90%;
        }
        h1 { font-size: 2rem; margin-bottom: 10px; }
        p { font-size: 1.2rem; }
        #countdown {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
        }
        .time-box {
            background: #ad1457;
            color: white;
            padding: 10px;
            border-radius: 10px;
            min-width: 60px;
        }
        .time-box span { display: block; font-size: 1.5rem; font-weight: bold; }
        .label { font-size: 0.8rem; margin-top: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🎉 ميلاد سعيد مسبقاً لـ "فيل" 🎉</h1>
    <p>المتبقي حتى تبلغين الـ 40 من العمر:</p>
    <p><strong>2026 / 04 / 04</strong></p>

    <div id="countdown">
        <div class="time-box">
            <span id="days">0</span>
            <div class="label">أيام</div>
        </div>
        <div class="time-box">
            <span id="hours">0</span>
            <div class="label">ساعات</div>
        </div>
        <div class="time-box">
            <span id="minutes">0</span>
            <div class="label">دقائق</div>
        </div>
        <div class="time-box">
            <span id="seconds">0</span>
            <div class="label">ثواني</div>
        </div>
    </div>
</div>

<script>
    const targetDate = new Date("April 4, 2026 00:00:00").getTime();

    const timer = setInterval(function() {
        const now = new Date().getTime();
        const distance = targetDate - now;

        const days = Math.floor(distance / (1000 * 60 * 60 * 24));
        const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((distance % (1000 * 60)) / 1000);

        document.getElementById("days").innerHTML = days;
        document.getElementById("hours").innerHTML = hours;
        document.getElementById("minutes").innerHTML = minutes;
        document.getElementById("seconds").innerHTML = seconds;

        if (distance < 0) {
            clearInterval(timer);
            document.querySelector(".container").innerHTML = "<h1>🎊 مبروك يا فيل! أصبحتِ 40 عاماً من العطاء والجمال! 🎊</h1>";
        }
    }, 1000);
</script>

</body>
</html>
